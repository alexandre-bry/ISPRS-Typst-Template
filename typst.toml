[package]
name = "magic-isprs"
version = "0.1.0"
entrypoint = "src/lib.typ"
authors = ["Alexandre Bry"]
license = "MIT"
description = "Paper for the International Society for Photogrammetry and Remote Sensing (ISPRS)."
repository = "https://github.com/alexandre-bry/ISPRS-Typst-Template"
keywords = ["template", "isprs", "paper"]
categories = ["paper"]
disciplines = [
    "computer-science",
    "engineering",
    "geography",
    "geology",
    "physics",
]
exclude = ["examples/"]

[template]
path = "template"
entrypoint = "main.typ"
thumbnail = "thumbnail.png"
